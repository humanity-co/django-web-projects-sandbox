<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Zoom with Speech Recognition</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        #image-container {
            width: 100%;
            height: 400px;
            overflow: hidden;
            position: relative;
        }

        #zoomable-image {
            width: 100%;
            height: auto;
            transition: transform 0.3s ease;
        }

        #speech-text {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }

        #speech-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        #speech-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>Zoom Image and Speech Recognition</h1>

    <div id="image-container">
        <img src="https://via.placeholder.com/500" alt="Zoomable Image" id="zoomable-image">
    </div>

    <button id="speech-btn">Start Speech Recognition</button>

    <div id="speech-text">Say something to recognize speech...</div>

    <script>
        let scale = 1;
        const image = document.getElementById("zoomable-image");
        const speechButton = document.getElementById("speech-btn");
        const speechText = document.getElementById("speech-text");

        // Pinch Zoom Handling (for mobile or touch events)
        let startDistance = 0;

        function getDistance(touch1, touch2) {
            const dx = touch2.pageX - touch1.pageX;
            const dy = touch2.pageY - touch1.pageY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function onTouchStart(e) {
            if (e.touches.length === 2) {
                startDistance = getDistance(e.touches[0], e.touches[1]);
            }
        }

        function onTouchMove(e) {
            if (e.touches.length === 2) {
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                const diff = currentDistance - startDistance;
                if (Math.abs(diff) > 10) {
                    scale += diff / 100;
                    scale = Math.max(1, Math.min(3, scale));  // Limit zoom scale
                    image.style.transform = `scale(${scale})`;
                    startDistance = currentDistance;
                }
            }
        }

        function onTouchEnd() {
            startDistance = 0;
        }

        // Event listeners for pinch zoom
        document.getElementById("image-container").addEventListener("touchstart", onTouchStart);
        document.getElementById("image-container").addEventListener("touchmove", onTouchMove);
        document.getElementById("image-container").addEventListener("touchend", onTouchEnd);

        // Speech Recognition Integration
        speechButton.addEventListener("click", function() {
            fetch("/recognize_speech")
                .then(response => response.json())
                .then(data => {
                    speechText.textContent = "You said: " + data.speech_text;
                })
                .catch(error => {
                    speechText.textContent = "Error in speech recognition.";
                });
        });
    </script>

</body>
</html>
