<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Zoom with Pinch Gesture</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #image-container {
            width: 80%;
            height: 80%;
            max-width: 800px;
            max-height: 600px;
            overflow: hidden;
            position: relative;
            border-radius: 15px;
            background-color: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #zoomable-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease-in-out;
            border-radius: 10px;
        }

        #instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #333;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div id="image-container">
        <img src="https://via.placeholder.com/800x600" alt="Zoomable Image" id="zoomable-image">
        <div id="instructions">Pinch to Zoom In/Out</div>
    </div>

    <script>
        let scale = 1;
        const image = document.getElementById("zoomable-image");
        const imageContainer = document.getElementById("image-container");
        const instructions = document.getElementById("instructions");

        // Display instructions on first load
        window.addEventListener("load", function() {
            instructions.style.display = "block";
            setTimeout(() => {
                instructions.style.opacity = "0";
                setTimeout(() => {
                    instructions.style.display = "none";
                }, 500);
            }, 2000);
        });

        // Pinch zoom event handling
        let startDistance = 0;
        let startScale = 1;

        function getDistance(touch1, touch2) {
            const dx = touch2.pageX - touch1.pageX;
            const dy = touch2.pageY - touch1.pageY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function onTouchStart(e) {
            if (e.touches.length === 2) {
                startDistance = getDistance(e.touches[0], e.touches[1]);
                startScale = scale;
            }
        }

        function onTouchMove(e) {
            if (e.touches.length === 2) {
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                const scaleFactor = currentDistance / startDistance;
                scale = startScale * scaleFactor;
                scale = Math.max(1, Math.min(3, scale));  // Limit zoom scale between 1x and 3x
                image.style.transform = `scale(${scale})`;
            }
        }

        function onTouchEnd() {
            startDistance = 0;
        }

        // Add event listeners for touch gestures (pinch)
        imageContainer.addEventListener("touchstart", onTouchStart);
        imageContainer.addEventListener("touchmove", onTouchMove);
        imageContainer.addEventListener("touchend", onTouchEnd);

        // Optional: Allow mouse wheel zoom (for desktop users)
        imageContainer.addEventListener("wheel", (e) => {
            e.preventDefault();
            let zoomFactor = e.deltaY < 0 ? 0.1 : -0.1;
            scale += zoomFactor;
            scale = Math.max(1, Math.min(3, scale));  // Limit zoom scale between 1x and 3x
            image.style.transform = `scale(${scale})`;
        });
    </script>

</body>
</html>
